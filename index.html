<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bad Cat Hot Sauce</title>

<style>
body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
}

/* ================= NAV ================= */
nav {
    position: sticky;
    top: 0;
    background: rgba(0,0,0,0.9);
    z-index: 1000;
}

.nav-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
}

.nav-logo img {
    height: 40px;
    cursor: pointer;
}

.nav-links {
    display: flex;
    gap: 15px;
    align-items: center;
}

.nav-links a {
    color: white;
    text-decoration: none;
}

/* BUTTONS */
.find-us-btn {
    padding: 8px 14px;
    border-radius: 999px;
    background: #ff3d00;
    border: none;
    color: white;
    cursor: pointer;
}

.ig-btn {
    padding: 8px 14px;
    border-radius: 999px;
    background: linear-gradient(45deg,#f58529,#dd2a7b,#8134af);
    color: white;
    text-decoration: none;
    display: flex;
    align-items: center;
}

/* HERO */
.hero {
    padding: 120px 20px;
    text-align: center;
    background: linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
    url('images/hero.jpg.JPG') center/cover;
}

/* PRODUCTS */
.products-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 40px;
}

.product-card {
    width: 240px;
    padding: 20px;
    border: 2px solid white;
    border-radius: 16px;
    text-align: center;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #111;
    padding: 20px;
    border-radius: 16px;
    max-width: 400px;
    text-align: center;
}

.modal-image {
    width: 100%;
    max-height: 60vh;
    object-fit: contain;
    margin-bottom: 10px;
}

.close-btn {
    margin-top: 10px;
    padding: 10px 20px;
    border-radius: 999px;
    background: #ff3d00;
    border: none;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- ================= NAV ================= -->
<nav>
  <div class="nav-container">

    <div class="nav-logo" onclick="openLogo()">
      <img src="images/logo2.JPG" alt="Logo">
    </div>

    <button class="find-us-btn" onclick="openMarket()">📍 Find Us</button>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="#products">Sauces</a>
      <a href="about.html">About</a>

      <a href="https://www.instagram.com/bad_cat_hot_sauce/" target="_blank" class="ig-btn">
        Instagram
      </a>

      <a href="https://www.etsy.com/shop/BadCatHotSauce" target="_blank">
        Etsy
      </a>
    </div>

  </div>
</nav>

<!-- ================= HERO ================= -->
<section class="hero">
  <h1>Bad Cat Hot Sauce</h1>
</section>

<!-- ================= PRODUCTS ================= -->
<section id="products">

<div class="products-grid">

  <div class="product-card">
    <h3>Jalapeño</h3>
    <button onclick="openProduct('Jalapeño','Fresh heat','images/jalapeno.jpeg')">
      View Sauce
    </button>
  </div>

  <div class="product-card">
    <h3>Fresno</h3>
    <button onclick="openProduct('Fresno','Sweet heat','images/fresno.jpeg')">
      View Sauce
    </button>
  </div>

  <div class="product-card">
    <h3>Thai Chili</h3>
    <button onclick="openProduct('Thai Chili','Sharp heat','images/thai.jpeg')">
      View Sauce
    </button>
  </div>

  <div class="product-card">
    <h3>Habanero</h3>
    <button onclick="openProduct('Habanero','Fruity heat','images/habanero.jpeg')">
      View Sauce
    </button>
  </div>

  <div class="product-card">
    <h3>Ghost</h3>
    <button onclick="openProduct('Ghost','Extreme heat','images/ghost.jpeg')">
      View Sauce
    </button>
  </div>

</div>

</section>

<!-- ================= MODAL ================= -->
<div id="modal" class="modal" onclick="closeModal(event)">
  <div class="modal-content">

    <img id="modalImg" class="modal-image">

    <h2 id="modalTitle"></h2>
    <p id="modalDesc"></p>

    <button class="close-btn" onclick="closeModal()">Close</button>

  </div>
</div>

<script>
const modal = document.getElementById("modal");
const img = document.getElementById("modalImg");
const title = document.getElementById("modalTitle");
const desc = document.getElementById("modalDesc");

function openProduct(t,d,i){
  modal.style.display="flex";
  img.src=i;
  title.textContent=t;
  desc.textContent=d;
}

function openLogo(){
  openProduct("Bad Cat Hot Sauce","Small batch hot sauce","images/logo2.JPG");
}

function openMarket(){
  openProduct("Find Us","Taos + Santa Fe Farmers Markets","images/market.png");
}

function closeModal(e){
  if(!e || e.target===modal) modal.style.display="none";
}
</script>

</body>
</html>
