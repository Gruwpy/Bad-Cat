<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bad Cat Hot Sauce</title>

<style>
/* ================= GLOBAL ================= */
body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
}

/* ================= NAV ================= */
nav {
    position: sticky;
    top: 0;
    background: rgba(0,0,0,0.9);
    z-index: 1000;
}

.nav-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 20px;
}

.nav-logo img {
    height: 40px;
    cursor: pointer;
}

.nav-links {
    display: flex;
    gap: 20px;
    align-items: center;
}

.nav-links a {
    color: white;
    text-decoration: none;
}

/* Instagram styling */
.instagram-link {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #E1306C;
}

/* Find Us button */
.find-us-btn {
    margin-left: 15px;
    padding: 8px 16px;
    border-radius: 999px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    cursor: pointer;
}

.find-us-btn:hover {
    background: #ff3d00;
}

/* ================= HERO ================= */
.hero {
    padding: 120px 20px;
    text-align: center;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url('images/hero.jpg') center/cover;
}

/* ================= PRODUCTS ================= */
.products-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 40px;
}

.product-card {
    border: 2px solid #fff;
    padding: 20px;
    border-radius: 16px;
    width: 240px;
    text-align: center;
}

.heat-meter span {
    opacity: 0.2;
}

.heat-meter .active {
    opacity: 1;
}

/* ================= MODAL ================= */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.modal-content {
    position: relative;
    width: 90%;
    max-width: 400px;
    padding: 20px;
    border-radius: 16px;
    overflow: hidden;
    color: white;
}

.modal-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0.35;
    z-index: 0;
}

.modal-inner {
    position: relative;
    z-index: 1;
}

.close {
    position: absolute;
    top: 10px;
    right: 12px;
    cursor: pointer;
    font-size: 22px;
}

.close-btn {
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 999px;
    border: none;
    background: #ff3d00;
    color: white;
    cursor: pointer;
}

.close-btn:hover {
    box-shadow: 0 0 10px #ff3d00;
}
</style>
</head>

<body>

<nav>
    <div class="nav-container">
        <div class="nav-logo" onclick="openLogo()">
            <img src="images/logo2.JPG">
        </div>

        <button class="find-us-btn" onclick="openMarket()">📍 Find Us</button>

        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#products">Sauces</a>
            <a href="#">About</a>

            <a href="https://www.instagram.com/bad_cat_hot_sauce/" target="_blank" class="instagram-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#E1306C">
                    <path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 0 5-2.2 5-5V7c0-2.8-2.2-5-5-5H7z"/>
                </svg>
                Instagram
            </a>

            <a href="https://www.etsy.com">Etsy</a>
        </div>
    </div>
</nav>

<section class="hero">
    <h1>Bad Cat Hot Sauce</h1>
</section>

<section id="products">
    <div class="products-grid">

        <div class="product-card">
            <h3>Jalapeño</h3>
            <div class="heat-meter">🌶️🌶️🌶️</div>
            <button onclick="openProduct('Jalapeño','Fresh heat','images/jalapeno.jpeg')">View</button>
        </div>

        <div class="product-card">
            <h3>Fresno</h3>
            <div class="heat-meter">🌶️🌶️🌶️🌶️</div>
            <button onclick="openProduct('Fresno','Sweet heat','images/fresno.jpeg')">View</button>
        </div>

    </div>
</section>

<!-- MODAL -->
<div id="productModal" class="modal">
    <div class="modal-content">
        <div class="modal-bg" id="modalBg"></div>

        <div class="modal-inner">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle"></h2>
            <p id="modalDesc"></p>
            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>
</div>

<script>
const modal = document.getElementById('productModal');
const modalTitle = document.getElementById('modalTitle');
const modalDesc = document.getElementById('modalDesc');
const modalBg = document.getElementById('modalBg');

function openProduct(name, desc, img) {
    modal.style.display = 'flex';
    modalTitle.textContent = name;
    modalDesc.textContent = desc;
    modalBg.style.backgroundImage = `url(${img})`;
}

function openLogo() {
    openProduct('Bad Cat Hot Sauce','Small batch fire','images/logo2.JPG');
}

function openMarket() {
    openProduct(
        'Find Us',
        'Catch us at the Taos Farmers Market! 8am-1pm!\nWe\'re also at the Santa Fe Farmers Market! 8am-1pm!',
        'images/market.png'
    );
}

function closeModal() {
    modal.style.display = 'none';
}

window.onclick = function(e) {
    if (e.target === modal) closeModal();
}
</script>

</body>
</html>
