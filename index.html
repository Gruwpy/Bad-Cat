<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bad Cat Hot Sauce</title>

<style>

/* ================= GLOBAL ================= */
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Arial, sans-serif;
}

/* ================= NAV ================= */
.nav-container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background: rgba(0,0,0,0.9);
}

.nav-logo img {
  height: 40px;
  cursor: pointer;
}

.nav-links {
  display: flex;
  gap: 18px;
  align-items: center;
}

.nav-links a {
  color: white;
  text-decoration: none;
}

/* Instagram */
.ig-btn {
  display: flex;
  gap: 6px;
  align-items: center;
  padding: 8px 14px;
  border-radius: 999px;
  background: linear-gradient(45deg,#f58529,#dd2a7b,#8134af);
  color: white;
  text-decoration: none;
}

.ig-icon {
  width: 18px;
  height: 18px;
  fill: white;
}

/* Find Us */
.find-us-btn {
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
}

/* ================= HERO ================= */
.hero {
  padding: 120px 20px;
  text-align: center;
  background: linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
  url('images/hero.jpg.JPG') center/cover;
}

/* ================= PRODUCTS ================= */
.products-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 40px;
}

.product-card {
  --accent: #fff;
  width: 240px;
  padding: 20px;
  border-radius: 16px;
  border: 2px solid var(--accent);
  text-align: center;
  transition: 0.3s;
}

.product-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 0 25px var(--accent);
}

/* BUTTONS */
.btn-premium {
  padding: 10px 18px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
}

.btn-accent {
  background: var(--accent);
  color: white;
}

/* HEAT */
.heat-meter {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin: 10px 0;
}

.pepper {
  opacity: 0.2;
}

.pepper.active {
  opacity: 1;
  color: var(--accent);
}

/* COLORS */
.jalapeno { --accent:#2e8b57; }
.fresno   { --accent:#ff4d4d; }
.thai     { --accent:#39ff14; }
.habanero { --accent:#ff8c00; }
.ghost    { --accent:#8b0000; }

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
}

.modal-content {
  width: 90%;
  max-width: 420px;
  padding: 20px;
  border-radius: 16px;
  background: #111;
}

.close-btn {
  margin-top: 15px;
  padding: 10px 18px;
  border-radius: 999px;
  background: #ff3d00;
  border: none;
  color: white;
  cursor: pointer;
}

</style>
</head>

<body>

<!-- NAV (paste nav.html here or include server-side) -->

<nav>

    <div class="nav-links">
      <a href="#">Home</a>

      <a class="ig-btn" href="https://www.instagram.com/bad_cat_hot_sauce/" target="_blank">
        Instagram
      </a>

      <a href="https://www.etsy.com/shop/BadCatHotSauce" target="_blank">
        Etsy
      </a>
    </div>

  </div>
</nav>

<section class="hero">

<!-- PRODUCTS (ALL 5 RESTORED) -->

</div>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h2 id="title"></h2>
    <p id="desc"></p>
    <button class="close-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const modal = document.getElementById('modal');
const title = document.getElementById('title');
const desc = document.getElementById('desc');

function openProduct(t,d){
  modal.style.display='flex';
  title.textContent=t;
  desc.textContent=d;
}

function openLogo(){
  openProduct("Bad Cat","Small batch sauce");
}

function openMarket(){
  openProduct("Find Us","Taos + Santa Fe Farmers Markets 8-1");
}

function closeModal(){
  modal.style.display='none';
}
</script>

</body>
</html>
