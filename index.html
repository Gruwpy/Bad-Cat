<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bad Cat Hot Sauce</title>

<style>
:root {
    --accent: #ff3d00;
}

/* ================= PAGE TRANSITION ================= */
.page-fade {
    position: fixed;
    inset: 0;
    background: #0b0b0b;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    z-index: 9999;
}

body.fade-out .page-fade {
    opacity: 1;
}

body.fade-in .page-fade {
    opacity: 0;
}

/* ================= HERO ================= */
.hero {
    background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.65)),
                url('https://via.placeholder.com/1500x500') no-repeat center/cover;
    color: white;
    padding: 120px 20px;
    text-align: center;
}

.hero h2 {
    font-size: 3rem;
    margin-bottom: 10px;
}

.hero p {
    font-size: 1.2rem;
    opacity: 0.9;
}

/* ================= BUTTON ================= */
.btn-premium {
    display: inline-block;
    margin-top: 15px;
    padding: 12px 26px;
    border-radius: 999px;
    text-decoration: none;
    transition: all 0.3s ease;
}

/* ================= PRODUCTS ================= */
#products {
    background: #111;
    color: white;
    padding: 60px 20px;
    text-align: center;
}

.products-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    margin-top: 40px;
}

.product-card {
    border: 2px solid var(--accent);
    border-radius: 16px;
    padding: 20px;
    width: 260px;
    background: rgba(255,255,255,0.05);
    transition: 0.3s;
}

.product-card:hover {
    transform: translateY(-8px);
}

/* ================= NAV ================= */
html { scroll-behavior: smooth; }

nav {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.nav-container {
    max-width: 1100px;
    margin: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
}

.nav-links {
    display: flex;
    gap: 20px;
    align-items: center;
}

.nav-links a {
    color: rgba(255,255,255,0.7);
    text-decoration: none;
}

.nav-links a:hover {
    color: white;
}

.etsy {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #f1641e;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="page-fade"></div>

<nav>
    <div class="nav-container">
        <div style="color:white;font-weight:bold;">Bad Cat 🔥</div>

        <div class="nav-links">
            <a href="#top">Home</a>
            <a href="#products">Sauces</a>
            <a href="about.html">About</a>

            <a class="etsy" href="https://www.etsy.com/shop/BadCatHotSauce" target="_blank">
                🔶 Visit Etsy
            </a>
        </div>
    </div>
</nav>

<section id="top" class="hero">
    <h2>Turn Up the Heat</h2>
    <p>Small batch hot sauces. Big flavor.</p>
    <a href="#products" class="btn-premium">Shop Sauces</a>
</section>

<section id="products">
    <h2>Our Sauces</h2>

    <div class="products-grid">
        <div class="product-card">Jalapeño</div>
        <div class="product-card">Fresno</div>
        <div class="product-card">Thai Chili</div>
        <div class="product-card">Habanero</div>
        <div class="product-card">Ghost</div>
    </div>
</section>

<script>
document.addEventListener("DOMContentLoaded", () => {
    document.body.classList.add("fade-in");

    document.querySelectorAll("a[href]").forEach(link => {
        const href = link.getAttribute("href");

        if (href && !href.startsWith("#") && !href.startsWith("http")) {
            link.addEventListener("click", e => {
                e.preventDefault();
                document.body.classList.add("fade-out");

                setTimeout(() => {
                    window.location.href = href;
                }, 300);
            });
        }
    });
});
</script>

</body>
</html>
