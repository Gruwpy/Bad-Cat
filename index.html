<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bad Cat Hot Sauce</title>

<style>
/* ================= GLOBAL ================= */
body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
}

/* ================= NAV ================= */
nav {
    position: sticky;
    top: 0;
    background: rgba(0,0,0,0.9);
    z-index: 1000;
}

.nav-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 20px;
}

.nav-logo img { height: 40px; cursor: pointer; }

.nav-links {
    display: flex;
    gap: 20px;
    align-items: center;
}

.nav-links a { color: white; text-decoration: none; }

.ig-btn {
    display: flex;
    align-items: center;
    gap: 8px;

    padding: 8px 14px;
    border-radius: 999px;

    text-decoration: none !important;
    font-size: 0.9rem;

    background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af);
    color: white !important;

    transition: 0.25s ease;
}

.ig-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 14px rgba(221, 42, 123, 0.6);
}

.ig-icon {
    width: 18px;
    height: 18px;
    fill: white;
}

/* prevents visited link purple issue */
.ig-btn:visited {
    color: white !important;
}

.find-us-btn {
    padding: 8px 16px;
    border-radius: 999px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    cursor: pointer;
}

.find-us-btn:hover {
    background: #ff3d00;
    box-shadow: 0 0 10px #ff3d00;
}

/* ================= HERO ================= */
.hero {
    padding: 120px 20px;
    text-align: center;
    /* FIX: ensure correct path + visible overlay */
    background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.65)), url('images/hero.jpg.JPG') no-repeat center/cover;
}

/* ================= PRODUCTS ================= */
.products-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 40px;
}

.product-card {
    --accent: #fff;
    border: 2px solid var(--accent);
    padding: 20px;
    border-radius: 16px;
    width: 240px;
    text-align: center;
    transition: 0.3s;
}

.product-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 0 25px var(--accent);
}

/* BUTTONS (FIX: restore colored bubble buttons) */
.btn-premium {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 20px;
    border-radius: 999px;
    border: none;
    text-decoration: none;
    cursor: pointer;
    transition: 0.3s;
}

.btn-accent {
    background: var(--accent);
    color: white;
}

.btn-accent:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 15px var(--accent);
}

/* ================= HEAT METER ================= */
.heat-meter {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin: 10px 0;
}

.pepper {
    opacity: 0.2;
    transition: 0.3s;
}

.pepper.active {
    opacity: 1;
    color: var(--accent);
    text-shadow: 0 0 8px var(--accent);
}

/* ================= FLAVOR COLORS ================= */
.jalapeno { --accent: #2e8b57; }
.fresno   { --accent: #ff4d4d; }
.thai     { --accent: #39ff14; }
.habanero { --accent: #ff8c00; }
.ghost    { --accent: #8b0000; }

/* ================= MODAL ================= */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.modal-content {
    position: relative;
    width: 90%;
    max-width: 400px;
    padding: 20px;
    border-radius: 16px;
    overflow: hidden;
}
.modal-content img {
    width: 100%;
    max-height: 300px;
    object-fit: contain; /* KEY FIX: shows full logo instead of cropping */
}
    .modal-image {
    width: 100%;
    max-height: 320px;
    object-fit: contain;
    margin-bottom: 12px;
    border-radius: 12px;
}
.modal-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0.35;
}

.modal-inner {
    position: relative;
    z-index: 1;
}

.close {
    position: absolute;
    top: 10px;
    right: 12px;
    cursor: pointer;
    font-size: 22px;
}

.close-btn {
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 999px;
    border: none;
    background: #ff3d00;
    color: white;
    cursor: pointer;
}

.close-btn:hover {
    box-shadow: 0 0 10px #ff3d00;
}
</style>
</head>

<body>

<!-- ================= MODAL ================= -->
<div id="productModal" class="modal">
  <div class="modal-content">

    <div class="modal-bg" id="modalBg"></div>

    <div class="modal-inner">

      <span class="close" onclick="closeModal()">&times;</span>
      <h2 id="modalTitle"></h2>
      <p id="modalDesc"></p>

      <button class="close-btn" onclick="closeModal()">Close</button>

    </div>
  </div>
</div>

<!-- ================= SCRIPTS ================= -->
<script>
const modal = document.getElementById("productModal");
const modalTitle = document.getElementById("modalTitle");
const modalDesc = document.getElementById("modalDesc");
const modalBg = document.getElementById("modalBg");

function openProduct(name, desc, img){
    modal.style.display = "flex";
    modalTitle.textContent = name;
    modalDesc.textContent = desc;

    modalBg.style.backgroundImage = `url(${img})`;
}

function openLogo() {
    modal.style.display = "flex";

    modalTitle.textContent = "Bad Cat Hot Sauce";
    modalDesc.textContent =
        "Small-batch fermented hot sauce from Taos, New Mexico. Built for bold flavor and serious heat.";

    modalBg.style.backgroundImage = "url(images/logo2.JPG)";
}

function openMarket(){
    openProduct(
        "Find Us",
        "Catch us at the Taos Farmers Market! 8am–1pm!\nWe are also at the Santa Fe Farmers Market! 8am–1pm!",
        "images/market.png"
    );
}

function closeModal(){
    modal.style.display = "none";
}

window.onclick = e => {
    if(e.target === modal) closeModal();
};
</script>
